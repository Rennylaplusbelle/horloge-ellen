<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poëtische Klok — Paris × Utrecht</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Cormorant+Garamond:ital@1&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: 'IBM Plex Mono', monospace;
        }

        .device {
            width: min(94vw, 720px);
            background: #0a0a0a;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .screen {
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            min-height: 540px;
        }

        .carousel {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
        }

        .carousel-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .carousel-slide.active { opacity: 1; }

        .carousel-slide svg {
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.55) 100%);
            z-index: 2;
        }

        .crt {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08), rgba(0,0,0,0.08) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        .content {
            position: relative;
            z-index: 5;
            padding: 30px;
            min-height: 540px;
            display: flex;
            flex-direction: column;
        }

        .led {
            position: absolute;
            top: 14px; right: 14px;
            width: 8px; height: 8px;
            background: #22C55E;
            border-radius: 50%;
            box-shadow: 0 0 10px #22C55E;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .audio-controls {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-btn {
            width: 40px; height: 40px;
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid rgba(34, 197, 94, 0.6);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .play-btn:hover {
            background: rgba(34, 197, 94, 0.4);
            border-color: #22C55E;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }
        .play-btn svg { width: 18px; height: 18px; fill: #22C55E; }
        .play-btn .pause-icon { display: none; }
        .play-btn.playing .play-icon { display: none; }
        .play-btn.playing .pause-icon { display: block; }

        .track-info {
            font-size: 9px;
            color: rgba(34, 197, 94, 0.7);
            line-height: 1.4;
        }
        .track-info .artist { color: #22C55E; font-weight: 600; }

        .sticker-cat, .sticker-dog {
            position: absolute;
            z-index: 20;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
        }
        .sticker-cat {
            width: 65px; height: 65px;
            top: 60px; left: 14px;
            animation: float1 4s ease-in-out infinite;
        }
        .sticker-dog {
            width: 85px; height: 65px;
            bottom: 65px; right: 14px;
            animation: float2 5s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-10px) rotate(-2deg); }
        }

        .poem-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            padding: 80px 10px 20px 10px;
        }

        .poem {
            font-size: 17px;
            line-height: 1.9;
            color: #22C55E;
            text-shadow: 0 0 10px rgba(34,197,94,0.6);
            min-height: 120px;
        }

        .cursor {
            display: inline-block;
            width: 10px; height: 1.1em;
            background: #22C55E;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }
        .cursor.pink { background: #EC4899; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        .translation-box {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.6s ease;
        }
        .translation-box.show { opacity: 1; transform: translateY(0); }

        .translation {
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            font-style: italic;
            line-height: 1.8;
            color: #EC4899;
            text-shadow: 0 0 12px rgba(236,72,153,0.5);
            padding-left: 14px;
            border-left: 2px solid rgba(236,72,153,0.4);
        }

        .anecdote-box {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.8s ease 0.2s;
        }
        .anecdote-box.show { opacity: 1; transform: translateY(0); }

        .anecdote {
            font-size: 10px;
            line-height: 1.6;
            color: rgba(236,72,153,0.65);
            padding-left: 14px;
            border-left: 2px solid rgba(236,72,153,0.25);
            max-width: 90%;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 12px;
        }
        .cities { display: flex; gap: 18px; }
        .city { font-size: 9px; color: rgba(34,197,94,0.5); text-transform: uppercase; letter-spacing: 1px; }
        .city span { display: block; font-size: 13px; color: rgba(34,197,94,0.85); margin-top: 3px; }
        .location { 
            font-size: 9px; 
            color: rgba(255,255,255,0.7); 
            background: rgba(255,255,255,0.15); 
            padding: 5px 12px; 
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .date { font-size: 12px; color: rgba(34,197,94,0.65); }

        .loading::after { content: '...'; animation: dots 1.5s steps(4) infinite; }
        @keyframes dots { 0%,20%{content:'';} 40%{content:'.';} 60%{content:'..';} 80%,100%{content:'...';} }
    </style>
</head>
<body>
    <div class="device">
        <div class="screen">
            <!-- Carrousel avec illustrations SVG d'Utrecht -->
            <div class="carousel" id="carousel">
                
                <!-- 1. Oudegracht Utrecht - Canaux avec caves -->

                <!-- 2. Domtoren - Tour de la cathédrale -->

                            <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">

                        <path fill="#4e342e" d="M380,230 L380,260 Q390,270 400,260 L400,230 Z"/>

                        <!-- Quai -->
                        <rect fill="#5d4037" x="0" y="350" width="800" height="50"/>

<script>
var locations = [
    'Utrecht — Oudegracht',
    'Utrecht — Domtoren',
    'Utrecht — Vélos',
    'Amsterdam — Canaux',
    'Paris — Luxembourg',
    'Keukenhof — Tulipes'
];

var poems = [
    { nl: "In het Luxembourg, waar stoelen groen staan,\ndenk ik aan Utrecht, aan Ellen's glimlach daar.\nDe Domtoren wijst naar dezelfde maan\ndie Parijs verlicht, zo wonderbaar.",
      fr: "Au Luxembourg, où les chaises sont vertes,\nje pense à Utrecht, au sourire d'Ellen.\nLa Domtoren pointe vers la même lune\nqui illumine Paris, si merveilleusement.",
      an: "Les célèbres chaises vertes du Jardin du Luxembourg sont au nombre de 6000." },
    { nl: "De grachten van Utrecht weerspiegelen\nde hemel die ook Parijs omarmt.\nEllen wandelt waar de Dom torens spreken,\nen mijn hart naar het Luxembourg verlangt.",
      fr: "Les canaux d'Utrecht reflètent\nle ciel qui embrasse aussi Paris.\nEllen marche où la Dom parle,\net mon cœur aspire au Luxembourg.",
      an: "Descartes vécut à Utrecht de 1629 à 1649, où il écrivit ses œuvres majeures." },
    { nl: "Tulpen bloeien in het Keukenhof licht,\nrozen groeien in Parijs' tuinen stil.\nEllen's stad draagt het ochtendgezicht,\nterwijl de Seine stroomt naar eigen wil.",
      fr: "Les tulipes fleurissent à Keukenhof,\nles roses poussent dans les jardins de Paris.\nLa ville d'Ellen porte le visage du matin,\ntandis que la Seine coule à sa guise.",
      an: "La tulipomanie vit certains bulbes se vendre plus cher qu'une maison à Amsterdam." },
    { nl: "Van Gogh droomde van Parijs' licht,\nvanuit de Nederlandse velden wijd.\nNu verbindt de avond dit gedicht,\nUtrecht en Parijs, door de tijd.",
      fr: "Van Gogh rêvait de la lumière de Paris,\ndepuis les vastes champs néerlandais.\nLe soir relie ce poème,\nUtrecht et Paris, à travers le temps.",
      an: "Van Gogh vécut à Paris de 1886 à 1888, où il peignit plus de 200 tableaux." },
    { nl: "Het Vondelpark ontwaakt in ochtenddauw,\nhet Luxembourg baadt in gouden gloed.\nEllen fietst door straten oud en grauw,\nParijs en Utrecht delen hetzelfde bloed.",
      fr: "Le Vondelpark s'éveille dans la rosée,\nle Luxembourg baigne dans la lueur dorée.\nEllen pédale dans les rues anciennes,\nParis et Utrecht partagent le même sang.",
      an: "Le Vondelpark accueille 10 millions de visiteurs par an." }
];

var currentSlide = 0;
var poemIdx = 0;
var lastMin = -1;
var typing = false;

var slides = document.querySelectorAll('.carousel-slide');
var locEl = document.getElementById('loc');
var audioPlayer = document.getElementById('audioPlayer');
var playBtn = document.getElementById('playBtn');

// Carrousel
function rotateCarousel() {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
    locEl.textContent = locations[currentSlide];
}

// Audio
playBtn.addEventListener('click', function() {
    if (audioPlayer.paused) {
        audioPlayer.play().then(function() {
            playBtn.classList.add('playing');
        }).catch(function(e) {
            console.log('Erreur audio:', e);
        });
    } else {
        audioPlayer.pause();
        playBtn.classList.remove('playing');
    }
});

// Horloge
function updateClock() {
    var now = new Date();
    document.getElementById('paris').textContent = now.toLocaleTimeString('fr-FR', { timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit' });
    document.getElementById('utrecht').textContent = now.toLocaleTimeString('nl-NL', { timeZone: 'Europe/Amsterdam', hour: '2-digit', minute: '2-digit' });
    document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
    
    var min = now.getMinutes();
    if (min !== lastMin && !typing) {
        lastMin = min;
        showPoem();
    }
}

function showPoem() {
    typing = true;
    document.getElementById('trBox').classList.remove('show');
    document.getElementById('anBox').classList.remove('show');
    document.getElementById('poem').innerHTML = '<span class="loading">Nieuw gedicht</span>';
    
    setTimeout(function() {
        var p = poems[poemIdx];
        poemIdx = (poemIdx + 1) % poems.length;
        
        typeText('poem', p.nl, 'cursor', function() {
            setTimeout(function() {
                document.getElementById('translation').innerHTML = '';
                document.getElementById('trBox').classList.add('show');
                typeText('translation', p.fr, 'cursor pink', function() {
                    setTimeout(function() {
                        document.getElementById('anecdote').textContent = p.an;
                        document.getElementById('anBox').classList.add('show');
                        typing = false;
                    }, 400);
                });
            }, 600);
        });
    }, 600);
}

function typeText(id, text, cursorClass, callback) {
    var el = document.getElementById(id);
    el.innerHTML = '<span class="' + cursorClass + '"></span>';
    var out = '';
    var i = 0;
    
    function typeChar() {
        if (i < text.length) {
            var ch = text[i];
            out += (ch === '\n') ? '<br>' : ch;
            el.innerHTML = out + '<span class="' + cursorClass + '"></span>';
            i++;
            setTimeout(typeChar, 30 + Math.random() * 25);
        } else {
            setTimeout(function() {
                el.innerHTML = out;
                if (callback) callback();
            }, 400);
        }
    }
    typeChar();
}

// Démarrage
updateClock();
setInterval(updateClock, 1000);
setInterval(rotateCarousel, 5000);
</script>
