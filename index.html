<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Poëtische Klok — Paris × Utrecht</title>
    <meta name="description" content="Une horloge poétique pour Ellen — poèmes bilingues NL/FR renouvelés chaque jour. Utrecht ↔ Paris.">
    <meta name="theme-color" content="#0a0a0a">
    <!-- iOS Add to Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ellen">
    <meta name="format-detection" content="telephone=no">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%230a0a0a'/><text x='50%25' y='52%25' font-size='110' text-anchor='middle' dominant-baseline='central'>💌</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><text y='50' font-size='56'>💌</text></svg>">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&family=Cormorant+Garamond:ital@1&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            font-family: 'IBM Plex Mono', monospace;
            /* Safe-area pour iPhones à encoche */
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
            padding-left: env(safe-area-inset-left, 0);
            padding-right: env(safe-area-inset-right, 0);
        }

        .device {
            width: min(94vw, 720px);
            background: #0a0a0a;
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .screen {
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            min-height: 540px;
        }

        .carousel {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
        }

        .carousel-slide {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        .carousel-slide.active { opacity: 1; }

        .carousel-slide svg {
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.55) 100%);
            z-index: 2;
        }

        .crt {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08), rgba(0,0,0,0.08) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 10;
        }

        .content {
            position: relative;
            z-index: 5;
            padding: 30px;
            min-height: 540px;
            display: flex;
            flex-direction: column;
        }

        .led {
            position: absolute;
            top: 18px; right: 14px;
            width: 8px; height: 8px;
            background: #22C55E;
            border-radius: 50%;
            box-shadow: 0 0 10px #22C55E;
            animation: pulse 2s infinite;
            z-index: 31;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .audio-controls {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-btn {
            width: 40px; height: 40px;
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid rgba(34, 197, 94, 0.6);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .play-btn:hover {
            background: rgba(34, 197, 94, 0.4);
            border-color: #22C55E;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
        }
        .play-btn svg { width: 18px; height: 18px; fill: #22C55E; }
        .play-btn .pause-icon { display: none; }
        .play-btn.playing .play-icon { display: none; }
        .play-btn.playing .pause-icon { display: block; }

        .track-info {
            font-size: 9px;
            color: rgba(34, 197, 94, 0.7);
            line-height: 1.4;
        }
        .track-info .artist { color: #22C55E; font-weight: 600; }

        .sticker-cat, .sticker-dog {
            position: absolute;
            z-index: 20;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.7));
        }
        .sticker-cat {
            width: 65px; height: 65px;
            top: 60px; left: 14px;
            animation: float1 4s ease-in-out infinite;
        }
        .sticker-dog {
            width: 85px; height: 65px;
            bottom: 65px; right: 14px;
            animation: float2 5s ease-in-out infinite;
        }
        @keyframes float1 {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }
        @keyframes float2 {
            0%, 100% { transform: translateY(0) rotate(2deg); }
            50% { transform: translateY(-10px) rotate(-2deg); }
        }

        .poem-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 18px;
            padding: 80px 10px 20px 10px;
        }

        /* Panneau sombre derrière le texte pour lisibilité maximale */
        .poem-panel {
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border-radius: 14px;
            padding: 18px 20px;
            border: 1px solid rgba(34, 197, 94, 0.15);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .poem {
            font-size: 19px;
            line-height: 1.85;
            color: #4ade80;
            text-shadow: 0 0 12px rgba(74,222,128,0.7);
            /* Pas de min-height : la hauteur est fixée par les 4 lignes naturelles.
               overflow:hidden empêche toute expansion lors du typing effect. */
            overflow: hidden;
            letter-spacing: 0.2px;
        }

        .cursor {
            display: inline-block;
            width: 10px; height: 1.1em;
            background: #22C55E;
            margin-left: 2px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }
        .cursor.pink { background: #EC4899; }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        .translation-box {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.6s ease;
        }
        .translation-box.show { opacity: 1; transform: translateY(0); }

        .translation {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            font-style: italic;
            line-height: 1.75;
            color: #f9a8d4;
            text-shadow: 0 0 14px rgba(249,168,212,0.55);
            padding-left: 14px;
            border-left: 2px solid rgba(236,72,153,0.5);
        }

        /* Tap-to-reveal : vers FR floutés jusqu'au tap */
        .fr-line {
            display: block;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: filter 0.5s ease, background 0.3s ease, transform 0.2s ease;
            filter: blur(6px);
            user-select: none;
        }
        .fr-line::after {
            content: ' 👁';
            font-size: 11px;
            opacity: 0.6;
        }
        .fr-line.revealed {
            filter: blur(0);
            user-select: text;
        }
        .fr-line.revealed::after { content: ''; }
        .fr-line:not(.revealed):active { transform: scale(0.98); }
        .fr-line:not(.revealed):hover { background: rgba(236,72,153,0.08); }

        .reveal-hint {
            display: block;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            font-style: normal;
            color: rgba(249,168,212,0.55);
            margin-top: 8px;
            padding-left: 14px;
            letter-spacing: 0.5px;
        }

        .anecdote-box {
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.8s ease 0.2s;
        }
        .anecdote-box.show { opacity: 1; transform: translateY(0); }

        .anecdote {
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid rgba(249,168,212,0.2);
            border-left: 3px solid rgba(236,72,153,0.6);
            font-size: 12px;
            line-height: 1.55;
            color: rgba(255,255,255,0.88);
            max-width: 100%;
        }
        .anecdote .an-nl {
            color: #4ade80;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            margin-bottom: 6px;
            text-shadow: 0 0 8px rgba(74,222,128,0.4);
        }
        .anecdote .an-fr {
            color: #f9a8d4;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            padding-top: 6px;
            border-top: 1px dashed rgba(249,168,212,0.2);
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-top: 12px;
        }
        .cities { display: flex; gap: 18px; }
        .city { font-size: 9px; color: rgba(34,197,94,0.5); text-transform: uppercase; letter-spacing: 1px; }
        .city span { display: block; font-size: 13px; color: rgba(34,197,94,0.85); margin-top: 3px; }
        .location {
            font-size: 9px;
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.15);
            padding: 5px 12px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .date { font-size: 12px; color: rgba(34,197,94,0.65); }

        .loading::after { content: '...'; animation: dots 1.5s steps(4) infinite; }
        @keyframes dots { 0%,20%{content:'';} 40%{content:'.';} 60%{content:'..';} 80%,100%{content:'...';} }

        /* =====================================================
           MOBILE LOCK — iPhone 14/16 : 1 écran, jamais de scroll
           100dvh = hauteur dynamique (exclut la barre Safari)
           min-height: 0 sur les enfants flex = CRITIQUE pour
           empêcher l'étirement quand le poème se tape
           ===================================================== */
        @media (max-width: 480px) {
            html { height: 100%; overflow: hidden; }

            body {
                height: 100dvh;
                min-height: unset;
                overflow: hidden;
                padding: 0;
                align-items: stretch;
            }

            .device {
                width: 100vw;
                height: 100dvh;
                border-radius: 0;
                padding: 0;
                box-shadow: none;
            }

            .screen {
                height: 100%;
                min-height: unset;
                border-radius: 0;
                overflow: hidden;
            }

            .content {
                height: 100%;
                min-height: unset;
                padding: 14px 14px 8px 14px;
                overflow: hidden;
            }

            /* Chaîne flex verrouillée : chaque enfant cède la place
               sans faire grossir le parent */
            .poem-area {
                flex: 1;
                min-height: 0;          /* CRITIQUE — empêche l'overflow flex */
                overflow: hidden;
                padding: 62px 0 0 0;
                gap: 8px;
            }

            .poem-panel {
                display: flex;
                flex-direction: column;
                min-height: 0;
                overflow: hidden;
                padding: 10px 12px;
                gap: 0;
            }

            /* Poème NL — hauteur fixe, ne grandit pas */
            .poem {
                font-size: 14px;
                line-height: 1.65;
                min-height: unset;
                flex-shrink: 0;
                overflow: hidden;
            }

            /* Traduction FR */
            .translation {
                font-size: 14px;
                line-height: 1.55;
                padding-left: 10px;
            }

            .fr-line { padding: 1px 2px; }
            .fr-line::after { font-size: 9px; }

            .reveal-hint { font-size: 9px; margin-top: 5px; }

            /* Bouton cœur compact */
            .heart-btn {
                margin-top: 6px;
                padding: 5px 10px;
                font-size: 9px;
            }
            .heart-btn .heart-icon { font-size: 11px; }

            /* Anecdote — taille réduite */
            .anecdote-box { flex-shrink: 0; }
            .anecdote {
                padding: 8px 12px;
                font-size: 11px;
            }
            .anecdote .an-nl { font-size: 10px; margin-bottom: 4px; }
            .anecdote .an-fr { font-size: 11px; padding-top: 4px; }

            /* Footer compact */
            .footer { padding-top: 6px; flex-shrink: 0; }
            .city { font-size: 8px; }
            .city span { font-size: 11px; }
            .location { font-size: 8px; padding: 4px 8px; }
            .date { font-size: 10px; }

            /* Stickers plus petits */
            .sticker-cat { width: 50px; height: 50px; top: 50px; left: 8px; }
            .sticker-dog { width: 65px; height: 50px; bottom: 55px; right: 8px; }

            /* Streak + bouton livre repositionnés */
            .streak { top: 8px; right: 22px; padding: 4px 9px; font-size: 10px; }
            .streak .badge { font-size: 12px; }
            .book-btn { top: 8px; right: 105px; padding: 5px 9px; font-size: 10px; }
        }

        /* --- Streak quotidien : compteur de jours --- */
        .streak {
            position: absolute;
            top: 12px;
            right: 34px;
            z-index: 30;
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(236,72,153,0.45);
            border-radius: 20px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #f9a8d4;
            text-shadow: 0 0 8px rgba(249,168,212,0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            animation: streakPulse 3s ease-in-out infinite;
        }
        .streak .badge { font-size: 14px; }
        .streak .count { font-weight: 600; color: #fff; }
        @keyframes streakPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(236,72,153,0.3); }
            50% { box-shadow: 0 0 18px rgba(236,72,153,0.6); }
        }

        /* --- Bouton cœur "sauver dans mon anthologie" --- */
        .heart-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            background: rgba(236,72,153,0.08);
            border: 1px solid rgba(236,72,153,0.35);
            color: #f9a8d4;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 7px 14px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }
        .heart-btn:hover {
            background: rgba(236,72,153,0.18);
            border-color: #ec4899;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(236,72,153,0.3);
        }
        .heart-btn:active { transform: translateY(0) scale(0.96); }
        .heart-btn.saved {
            background: rgba(236,72,153,0.25);
            color: #fff;
            border-color: #ec4899;
        }
        .heart-btn .heart-icon { font-size: 13px; transition: transform 0.4s ease; }
        .heart-btn.saved .heart-icon { animation: heartBeat 0.6s ease; }
        @keyframes heartBeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.5); }
            60% { transform: scale(0.9); }
            100% { transform: scale(1.1); }
        }

        /* --- Bouton livre (ouvre l'anthologie) --- */
        .book-btn {
            position: absolute;
            top: 12px;
            right: 130px;
            z-index: 30;
            background: rgba(0,0,0,0.65);
            border: 1px solid rgba(74,222,128,0.45);
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: #4ade80;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }
        .book-btn:hover {
            background: rgba(74,222,128,0.15);
            box-shadow: 0 0 14px rgba(74,222,128,0.4);
        }
        .book-btn .book-count {
            color: #fff;
            font-weight: 600;
        }

        /* --- Modale Anthologie : plein écran --- */
        .modal-backdrop {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
        }
        .modal-backdrop.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(249,168,212,0.25);
            background: rgba(236,72,153,0.08);
        }
        .modal-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 18px;
            color: #f9a8d4;
            text-shadow: 0 0 10px rgba(249,168,212,0.5);
        }
        .modal-title .count-pill {
            display: inline-block;
            background: rgba(236,72,153,0.2);
            border: 1px solid rgba(236,72,153,0.5);
            border-radius: 12px;
            padding: 2px 10px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: #fff;
            font-style: normal;
            margin-left: 8px;
        }
        .modal-close {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 32px; height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .modal-close:hover {
            background: rgba(255,255,255,0.18);
            transform: rotate(90deg);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            -webkit-overflow-scrolling: touch;
        }
        .modal-empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 16px;
            line-height: 1.8;
        }
        .modal-empty .empty-icon {
            font-size: 40px;
            display: block;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .saved-card {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(74,222,128,0.2);
            border-left: 3px solid rgba(236,72,153,0.6);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .saved-card .saved-nl {
            color: #4ade80;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-line;
            text-shadow: 0 0 8px rgba(74,222,128,0.4);
        }
        .saved-card .saved-fr {
            color: #f9a8d4;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 14px;
            line-height: 1.65;
            white-space: pre-line;
            padding-top: 10px;
            margin-top: 10px;
            border-top: 1px dashed rgba(249,168,212,0.25);
            text-shadow: 0 0 10px rgba(249,168,212,0.35);
        }
        .saved-card .saved-date {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }
        .saved-card .saved-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            font-size: 14px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .saved-card .saved-remove:hover {
            color: #ef4444;
            background: rgba(239,68,68,0.1);
        }

        /* --- Toast de confirmation --- */
        .toast {
            position: absolute;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(0,0,0,0.88);
            border: 1px solid rgba(236,72,153,0.5);
            color: #f9a8d4;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            padding: 10px 18px;
            border-radius: 20px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s ease;
            z-index: 40;
            box-shadow: 0 8px 25px rgba(236,72,153,0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="device">
        <div class="screen">
            <div class="carousel" id="carousel">

                <!-- 1. Oudegracht Utrecht -->
                <div class="carousel-slide active">
                    <svg viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
                        <defs>
                            <linearGradient id="sky1" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#1a237e"/>
                                <stop offset="50%" stop-color="#3949ab"/>
                                <stop offset="100%" stop-color="#7986cb"/>
                            </linearGradient>
                            <linearGradient id="water1" x1="0%" y1="0%" x2="0%" y2="100%">
                                <stop offset="0%" stop-color="#1565c0"/>
                                <stop offset="100%" stop-color="#0d47a1"/>

// Générateur pseudo-aléatoire déterministe (Mulberry32)
function mulberry32(seed) {
    return function() {
        seed |= 0;
        seed = seed + 0x6D2B79F5 | 0;
        var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
}

// Seed unique par jour (change chaque minuit)
function dailySeed() {
    var d = new Date();
    return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function pick(arr, rng) {
    return arr[Math.floor(rng() * arr.length)];
}

// ---- GÉNÉRATEUR DE POÈME ----
function buildPoem(seed) {
    var rng = mulberry32(seed);
    // Piocher les INDEX une seule fois pour garantir NL[i] ↔ FR[i] alignés
    var iO = Math.floor(rng() * NL.ouvertures.length);
    var iP = Math.floor(rng() * NL.ponts.length);
    var iM = Math.floor(rng() * NL.milieux.length);
    var iC = Math.floor(rng() * NL.clotûres.length);
    var nl = NL.ouvertures[iO] + '\n'
           + NL.ponts[iP] + '\n'
           + NL.milieux[iM] + '\n'
           + NL.clotûres[iC];
    var fr = FR.ouvertures[iO] + '\n'
           + FR.ponts[iP] + '\n'
           + FR.milieux[iM] + '\n'
           + FR.clotûres[iC];
    return { nl: nl, fr: fr };
}

function generateDailyPoems() {
    var base = dailySeed();
    var poems = [];
    var usedAnecdotes = [];

    for (var i = 0; i < 5; i++) {
        var poem = buildPoem(base + i * 1337);

        // Anecdote unique par slot
        var aRng = mulberry32(base + i * 9973);
        var anecdote, tries = 0;
        do {
            anecdote = pick(ANECDOTES, aRng);
            tries++;
        } while (usedAnecdotes.indexOf(anecdote) !== -1 && tries < 30);
        usedAnecdotes.push(anecdote);

        poems.push({ nl: poem.nl, fr: poem.fr, an: anecdote });
    }
    return poems;
}

// ---- RUNTIME ----
var locations = [
    'Utrecht — Oudegracht',
    'Utrecht — Domtoren',
    'Utrecht — Vélos',
    'Amsterdam — Canaux',
    'Paris — Luxembourg',
    'Keukenhof — Tulipes'
];

var poems = generateDailyPoems();
var currentSlide = 0;
var poemIdx = 0;
var lastMin = -1;
var typing = false;

var slides = document.querySelectorAll('.carousel-slide');
var locEl = document.getElementById('loc');
var audioPlayer = document.getElementById('audioPlayer');
var playBtn = document.getElementById('playBtn');

// Carrousel
function rotateCarousel() {
    slides[currentSlide].classList.remove('active');
    currentSlide = (currentSlide + 1) % slides.length;
    slides[currentSlide].classList.add('active');
    locEl.textContent = locations[currentSlide];
}

// Audio
playBtn.addEventListener('click', function() {
    if (audioPlayer.paused) {
        audioPlayer.play().then(function() {
            playBtn.classList.add('playing');
        }).catch(function(e) { console.log('Audio:', e); });
    } else {
        audioPlayer.pause();
        playBtn.classList.remove('playing');
    }
});

// Horloge
function updateClock() {
    var now = new Date();
    document.getElementById('paris').textContent = now.toLocaleTimeString('fr-FR', { timeZone: 'Europe/Paris', hour: '2-digit', minute: '2-digit' });
    document.getElementById('utrecht').textContent = now.toLocaleTimeString('nl-NL', { timeZone: 'Europe/Amsterdam', hour: '2-digit', minute: '2-digit' });
    document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });

    var min = now.getMinutes();
    if (min !== lastMin && !typing) {
        lastMin = min;
        // Regénère si minuit passé (nouveau jour)
        if (now.getHours() === 0 && min === 0) {
            poems = generateDailyPoems();
            poemIdx = 0;
        }
        showPoem();
    }
}

var currentPoem = null;

function showPoem() {
    typing = true;
    document.getElementById('trBox').classList.remove('show');
    document.getElementById('anBox').classList.remove('show');
    document.getElementById('poem').innerHTML = '<span class="loading">Nieuw gedicht</span>';

    setTimeout(function() {
        var p = poems[poemIdx % poems.length];
        poemIdx = (poemIdx + 1) % poems.length;
        currentPoem = p;

        typeText('poem', p.nl, 'cursor', function() {
            setTimeout(function() {
                renderFrenchLines(p.fr);
                document.getElementById('trBox').classList.add('show');
                setTimeout(function() {
                    var anEl = document.getElementById('anecdote');
                    // p.an est maintenant un objet {fr, nl}
                    if (p.an && typeof p.an === 'object') {
                        anEl.innerHTML =
                            '<div class="an-nl">' + p.an.nl + '</div>' +
                            '<div class="an-fr">' + p.an.fr + '</div>';
                    } else {
                        anEl.textContent = p.an || '';
                    }
                    document.getElementById('anBox').classList.add('show');
                    typing = false;
                    updateHeartButton();
                }, 500);
            }, 600);
        });
    }, 600);
}

// Rend la traduction FR en lignes tap-to-reveal (floutées par défaut)
function renderFrenchLines(fr) {
    var el = document.getElementById('translation');
    el.innerHTML = '';
    var lines = fr.split('\n');
    lines.forEach(function(line, i) {
        var span = document.createElement('span');
        span.className = 'fr-line';
        span.textContent = line;
        span.addEventListener('click', function() {
            span.classList.add('revealed');
            // Quand toutes les lignes sont révélées, cache le hint
            var remaining = el.querySelectorAll('.fr-line:not(.revealed)').length;
            if (remaining === 0) {
                var hint = document.getElementById('revealHint');
                if (hint) hint.style.opacity = '0';
            }
        });
        el.appendChild(span);
    });
    var hint = document.getElementById('revealHint');
    if (hint) hint.style.opacity = '';
}

function typeText(id, text, cursorClass, callback) {
    var el = document.getElementById(id);
    el.innerHTML = '<span class="' + cursorClass + '"></span>';
    var out = '';
    var i = 0;

    function typeChar() {
        if (i < text.length) {
            var ch = text[i];
            out += (ch === '\n') ? '<br>' : ch;
            el.innerHTML = out + '<span class="' + cursorClass + '"></span>';
            i++;
            setTimeout(typeChar, 28 + Math.random() * 22);
        } else {
            setTimeout(function() {
                el.innerHTML = out;
                if (callback) callback();
            }, 400);
        }
    }
    typeChar();
}

// ============================================================
// STREAK QUOTIDIEN — Jours avec Ellen (pas de punition si raté)
// ============================================================
function updateStreak() {
    var todayKey = new Date().toISOString().slice(0, 10); // "2026-04-05"
    var data;
    try {
        data = JSON.parse(localStorage.getItem('ellen_streak') || 'null');
    } catch (e) { data = null; }

    if (!data) {
        data = { firstDay: todayKey, lastDay: todayKey, totalDays: 1 };
    } else if (data.lastDay !== todayKey) {
        // Jour différent → incrémente (pas de reset même si raté des jours)
        data.totalDays = (data.totalDays || 0) + 1;
        data.lastDay = todayKey;
    }
    localStorage.setItem('ellen_streak', JSON.stringify(data));

    document.getElementById('streakCount').textContent = data.totalDays;

    // Badge évolutif selon paliers
    var badge = '💌';
    if (data.totalDays >= 365) badge = '💍';
    else if (data.totalDays >= 100) badge = '🗼';
    else if (data.totalDays >= 30) badge = '🏛️';
    else if (data.totalDays >= 7) badge = '🌷';
    document.getElementById('streakBadge').textContent = badge;
}

// ============================================================
// ANTHOLOGIE — Poèmes sauvegardés par Ellen
// ============================================================
function getAnthology() {
    try {
        return JSON.parse(localStorage.getItem('ellen_anthology') || '[]');
    } catch (e) { return []; }
}

function isCurrentPoemSaved() {
    if (!currentPoem) return false;
    var anth = getAnthology();
    return anth.some(function(p) { return p.nl === currentPoem.nl; });
}

function updateHeartButton() {
    var btn = document.getElementById('heartBtn');
    var icon = btn.querySelector('.heart-icon');
    var label = document.getElementById('heartLabel');
    if (isCurrentPoemSaved()) {
        btn.classList.add('saved');
        icon.textContent = '❤️';
        label.textContent = 'bewaard · gardé';
    } else {
        btn.classList.remove('saved');
        icon.textContent = '🤍';
        label.textContent = 'bewaar · garder';
    }
}

function toggleSavePoem() {
    if (!currentPoem || typing) return;
    var anth = getAnthology();
    var idx = anth.findIndex(function(p) { return p.nl === currentPoem.nl; });
    if (idx >= 0) {
        anth.splice(idx, 1);
        showToast('💔 verwijderd · retiré');
    } else {
        anth.push({
            nl: currentPoem.nl,
            fr: currentPoem.fr,
            savedAt: new Date().toISOString()
        });
        showToast('❤️ ' + anth.length + ' gedichten bewaard · poèmes gardés');
    }
    localStorage.setItem('ellen_anthology', JSON.stringify(anth));
    updateHeartButton();
    var bc = document.getElementById('bookCount');
    if (bc) bc.textContent = anth.length;
}

// ============================================================
// TOAST
// ============================================================
var toastTimer = null;
function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
        t.classList.remove('show');
    }, 2400);
}

document.getElementById('heartBtn').addEventListener('click', toggleSavePoem);

// ============================================================
// MODALE ANTHOLOGIE — onglet "Mes poèmes sauvegardés"
// ============================================================
function renderAnthology() {
    var anth = getAnthology();
    var body = document.getElementById('modalBody');
    document.getElementById('modalCount').textContent = anth.length;
    document.getElementById('bookCount').textContent = anth.length;

    if (anth.length === 0) {
        body.innerHTML =
            '<div class="modal-empty">' +
            '<span class="empty-icon">💌</span>' +
            'Nog geen bewaarde gedichten.<br>' +
            'Aucun poème encore gardé.<br><br>' +
            '<span style="font-size:12px;opacity:0.6">Tik op 🤍 om een gedicht te bewaren.<br>Tape sur 🤍 pour en garder un.</span>' +
            '</div>';
        return;
    }

    // Tri : plus récent en premier
    var sorted = anth.slice().sort(function(a, b) {
        return (b.savedAt || '').localeCompare(a.savedAt || '');
    });

    body.innerHTML = sorted.map(function(p, idx) {
        var d = p.savedAt ? new Date(p.savedAt) : null;
        var dateStr = d ? d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' }) : '';
        var safeNl = (p.nl || '').replace(/</g, '&lt;');
        var safeFr = (p.fr || '').replace(/</g, '&lt;');
        return (
            '<div class="saved-card">' +
                '<button class="saved-remove" data-nl="' + encodeURIComponent(p.nl) + '" title="Supprimer">🗑</button>' +
                '<div class="saved-nl">' + safeNl + '</div>' +
                '<div class="saved-fr">' + safeFr + '</div>' +
                (dateStr ? '<div class="saved-date">' + dateStr + '</div>' : '') +
            '</div>'
        );
    }).join('');

    // Bind remove buttons
    body.querySelectorAll('.saved-remove').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            var nlKey = decodeURIComponent(btn.getAttribute('data-nl'));
            var a = getAnthology();
            var i = a.findIndex(function(x) { return x.nl === nlKey; });
            if (i >= 0) {
                a.splice(i, 1);
                localStorage.setItem('ellen_anthology', JSON.stringify(a));
                renderAnthology();
                updateHeartButton();
                showToast('💔 verwijderd · retiré');
            }
        });
    });
}

function openModal() {
    renderAnthology();
    document.getElementById('modal').classList.add('show');
}
function closeModal() {
    document.getElementById('modal').classList.remove('show');
}

document.getElementById('bookBtn').addEventListener('click', openModal);
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target.id === 'modal') closeModal();
});

// Initialise le compteur du bouton livre au chargement
document.getElementById('bookCount').textContent = getAnthology().length;

// ============================================================
// RÉGÉNÉRATION FIABLE des poèmes si jour changé
// (fallback si l'utilisateur n'ouvre pas à minuit pile)
// ============================================================
var lastSeedCheck = dailySeed();
function checkDayChange() {
    var current = dailySeed();
    if (current !== lastSeedCheck) {
        lastSeedCheck = current;
        poems = generateDailyPoems();
        poemIdx = 0;
        updateStreak();
        console.log('🌅 Nouveau jour détecté — poèmes régénérés');
    }
}

// Démarrage
updateStreak();
updateClock();
setInterval(updateClock, 1000);
setInterval(rotateCarousel, 5000);
setInterval(checkDayChange, 60000); // check chaque minute
</script>
